<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#f7fbef" />
  <title>蔬菜合成</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hud" aria-label="遊戲資訊">
      <div>
        <h1>蔬菜合成</h1>
        <p id="nextLabel">下一個：豌豆</p>
        <div class="exp-meter" aria-label="經驗值">
          <span id="expFill"></span>
        </div>
      </div>
      <div class="stats">
        <span id="score">分數 0</span>
        <span id="bestLevel">最高等級 1</span>
        <span id="playerLevel">Lv 1</span>
      </div>
      <button id="pauseButton" type="button" aria-label="暫停遊戲">暫停</button>
    </section>

    <section class="game-frame" aria-label="遊戲區">
      <div id="canvas-container"></div>
      <div id="gameOverPanel" class="game-over" hidden>
        <strong>遊戲結束</strong>
        <span id="finalScore">分數 0</span>
        <span id="finalCombo">最高 Combo 0</span>
        <button id="gameOverLeaderboardButton" type="button">排行榜</button>
        <button id="playAgainButton" type="button">再玩一次</button>
      </div>
      <div id="pausePanel" class="pause-panel" hidden>
        <strong>暫停中</strong>
        <span>你可以在這裡調整音量大小，確認現在聽起來是否合適。</span>
        <div class="audio-controls" aria-label="音量控制">
          <button id="soundButton" type="button" aria-label="音效開關">音效</button>
          <label>
            <span>音樂</span>
            <input id="musicVolumeSlider" type="range" min="0" max="100" value="70" aria-label="音樂音量" />
          </label>
          <label>
            <span>音效</span>
            <input id="sfxVolumeSlider" type="range" min="0" max="100" value="85" aria-label="音效音量" />
          </label>
        </div>
        <button id="resumeButton" class="resume-button" type="button">繼續遊戲</button>
        <button id="restartButton" class="quiet-button" type="button" aria-label="重新開始">重新開始</button>
      </div>
      <div id="skillPanel" class="skill-panel" hidden>
        <div class="skill-panel-inner">
          <p id="skillPanelKicker">等級 5</p>
          <strong>選擇技能</strong>
          <span>技能可以重複選擇並疊加效果。</span>
          <div id="skillCards" class="skill-cards" aria-label="技能選項"></div>
        </div>
      </div>
    </section>

    <section id="startScene" class="start-scene" aria-label="開始畫面">
      <div class="start-art" aria-hidden="true">
        <img src="assets/vegetables/01-pea.png" alt="" />
        <img src="assets/vegetables/04-tomato.png" alt="" />
        <img src="assets/vegetables/07-corn.png" alt="" />
        <img src="assets/vegetables/10-pumpkin.png" alt="" />
      </div>
      <div class="start-copy">
        <p>準備好開始了嗎</p>
        <h2>蔬菜合成</h2>
        <span>合併、累積 COMBO，衝出更高分數。</span>
      </div>
      <div class="start-badges" aria-label="遊戲特色">
        <span>10 種蔬菜</span>
        <span>連鎖 COMBO</span>
        <span>排行榜</span>
      </div>
      <div class="start-actions">
        <button id="startButton" class="start-button" type="button">開始遊戲</button>
        <button id="startLeaderboardButton" class="ghost-button" type="button">查看排行榜</button>
      </div>
    </section>

    <section id="leaderboardScene" class="leaderboard-scene" aria-label="排行榜" hidden>
      <div class="leaderboard-panel">
        <header class="leaderboard-header">
          <div>
            <h2>排行榜</h2>
          </div>
          <button id="closeLeaderboardButton" class="icon-button" type="button" aria-label="關閉排行榜">×</button>
        </header>

        <div class="account-row">
          <span id="accountStatus">尚未登入，排行榜將使用本機資料。</span>
          <button id="googleSignInButton" type="button">Google 登入</button>
        </div>

        <div class="leaderboard-tabs" role="tablist" aria-label="排行榜分頁">
          <button id="scoreTabButton" class="active" type="button">分數榜</button>
          <button id="comboTabButton" type="button">Combo</button>
        </div>

        <ol id="leaderboardList" class="leaderboard-list"></ol>
        <p id="leaderboardMessage" class="leaderboard-message">載入中...</p>
      </div>
    </section>
  </main>

  <script>
    window.SUPABASE_CONFIG = window.SUPABASE_CONFIG || {
      url: 'https://eebwaztfebmqnuarcysh.supabase.co',

    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/dom.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/hud-combo.js"></script>
  <script src="js/skills.js"></script>
  <script src="js/gameplay.js"></script>
  <script src="js/rendering.js"></script>
  <script src="js/events.js"></script>
</body>
</html>
